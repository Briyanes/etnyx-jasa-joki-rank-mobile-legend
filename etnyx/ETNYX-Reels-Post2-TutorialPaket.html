<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNYX Reels — Post 2: Tutorial Order Joki Paket (60s)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    min-height:100vh; gap:16px; padding:16px 0;
    font-family:'Inter',sans-serif;
    overflow:auto;
  }
  .stage {
    position:relative;
    width:calc(390px * var(--phone-scale, 1));
    height:calc(844px * var(--phone-scale, 1));
    flex:0 0 auto;
  }
  .phone {
    width:390px; height:844px;
    background:#0F1419;
    position:absolute; top:0; left:0; overflow:hidden;
    border-radius:40px;
    box-shadow:0 0 60px rgba(45,212,191,0.15);
    transform:scale(var(--phone-scale, 1));
    transform-origin:top left;
  }
  .scene {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    padding:40px 28px;
    opacity:0; transition:opacity 0.35s ease;
    z-index:1;
  }
  .scene.active { opacity:1; z-index:10; }

  /* ========== STEP INDICATOR (persistent overlay) ========== */
  .step-overlay {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    z-index:50;
    display:flex; gap:6px; align-items:center;
    opacity:0; transition:opacity 0.3s;
  }
  .step-overlay.show { opacity:1; }
  .step-dot {
    width:28px; height:28px; border-radius:50%;
    background:#1E2A35;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#4A5568;
    transition:all 0.3s;
    border:2px solid transparent;
  }
  .step-dot.active {
    background:rgba(45,212,191,0.15);
    border-color:#2DD4BF;
    color:#2DD4BF;
  }
  .step-dot.done {
    background:rgba(34,197,94,0.15);
    border-color:#22C55E;
    color:#22C55E;
  }
  .step-line { width:12px; height:2px; background:#1E2A35; border-radius:1px; }
  .step-line.done { background:#22C55E; }

  /* ========== SCENE 0: HOOK (0-3s) ========== */
  .s0 { background:radial-gradient(ellipse at center, rgba(45,212,191,0.08) 0%, #0F1419 70%); }
  .s0 .hook-text {
    font-size:28px; font-weight:900; color:#fff;
    text-align:center; line-height:1.3;
    opacity:0; transform:scale(0.85);
    transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .s0 .hook-text.show { opacity:1; transform:scale(1); }
  .s0 .hook-text .teal { color:#2DD4BF; }
  .s0 .hook-sub {
    font-size:14px; color:#7FA8A3; font-weight:600;
    margin-top:10px;
    opacity:0; transition:opacity 0.3s ease 0.3s;
  }
  .s0 .hook-sub.show { opacity:1; }
  .s0 .hook-badge {
    background:rgba(45,212,191,0.12);
    border:1px solid rgba(45,212,191,0.3);
    color:#2DD4BF;
    font-size:12px; font-weight:800;
    padding:6px 16px; border-radius:20px;
    margin-top:18px;
    opacity:0; transform:translateY(10px);
    transition:all 0.3s ease 0.5s;
  }
  .s0 .hook-badge.show { opacity:1; transform:translateY(0); }
  .preview-launch {
    position:absolute;
    left:50%; bottom:96px;
    transform:translateX(-50%);
    z-index:120;
    background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    color:#0F1419;
    border:none;
    border-radius:999px;
    padding:12px 20px;
    font-size:13px;
    font-weight:900;
    font-family:'Inter',sans-serif;
    box-shadow:0 12px 32px rgba(45,212,191,0.22);
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }
  .preview-launch:hover { transform:translateX(-50%) scale(1.03); box-shadow:0 16px 36px rgba(45,212,191,0.28); }
  .preview-launch.hidden { opacity:0; pointer-events:none; }
  .preview-note {
    position:absolute;
    left:50%; bottom:64px;
    transform:translateX(-50%);
    z-index:120;
    font-size:10px;
    font-weight:700;
    color:#7FA8A3;
    letter-spacing:0.04em;
  }
  .preview-note.hidden { opacity:0; }
  .preview-floating {
    position:fixed;
    left:50%; bottom:24px;
    transform:translateX(-50%);
    z-index:1400;
    display:none;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-radius:16px;
    background:rgba(15,20,25,0.88);
    border:1px solid rgba(45,212,191,0.28);
    box-shadow:0 18px 44px rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
  }
  .preview-floating.show { display:flex; }
  .preview-floating .pf-btn {
    background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    color:#0F1419;
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:12px;
    font-weight:900;
    font-family:'Inter',sans-serif;
    cursor:pointer;
  }
  .preview-floating .pf-text {
    font-size:11px;
    font-weight:700;
    color:#B8D4CF;
    white-space:nowrap;
  }
  @media (max-height: 900px), (max-width: 480px) {
    body { padding:16px; }
    .preview-floating.show { display:flex; }
  }

  /* ========== SCENE 1: Buka Website + Klik Order (3-10s) ========== */
  .s1 { padding:60px 24px 40px; justify-content:flex-start; overflow:hidden; }
  .step-label {
    font-size:12px; font-weight:800; color:#2DD4BF;
    background:rgba(45,212,191,0.1);
    border:1px solid rgba(45,212,191,0.3);
    padding:4px 12px; border-radius:14px;
    margin-bottom:14px;
    opacity:0; transition:opacity 0.3s;
  }
  .step-label.show { opacity:1; }

  .browser-frame {
    width:100%; background:#151B22;
    border:1px solid #1E2A35;
    border-radius:14px; overflow:hidden;
    opacity:0; transform:translateY(20px);
    transition:all 0.5s ease;
  }
  .browser-frame.show { opacity:1; transform:translateY(0); }
  .browser-bar {
    background:#0D1117; padding:8px 14px;
    display:flex; align-items:center; gap:8px;
    border-bottom:1px solid #1E2A35;
  }
  .browser-dots { display:flex; gap:4px; }
  .browser-dots span { width:8px; height:8px; border-radius:50%; background:#2A3441; }
  .browser-url {
    flex:1; background:#151B22; border-radius:6px;
    padding:4px 10px; font-size:10px; color:#7FA8A3;
    font-weight:600;
  }
  .browser-url .green { color:#22C55E; }

  .site-nav {
    padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between;
  }
  .site-nav .brand {
    font-size:16px; font-weight:900;
    background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .site-nav .order-btn {
    background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    color:#0F1419; font-size:11px; font-weight:800;
    padding:6px 14px; border-radius:8px;
    position:relative;
  }
  .site-nav .order-btn .pulse-ring {
    position:absolute; inset:-4px; border-radius:12px;
    border:2px solid #2DD4BF; opacity:0;
  }
  .site-nav .order-btn .pulse-ring.show {
    animation:pulseRing 0.8s ease 2;
  }
  @keyframes pulseRing {
    0% { opacity:1; inset:-4px; }
    100% { opacity:0; inset:-14px; }
  }

  .site-hero {
    padding:20px 16px; text-align:center;
  }
  .site-hero h3 {
    font-size:16px; font-weight:900; color:#fff;
    margin-bottom:4px;
  }
  .site-hero p { font-size:10px; color:#7FA8A3; }

  /* Cursor */
  .cursor {
    position:absolute;
    width:20px; height:20px;
    border-radius:50%;
    background:rgba(255,255,255,0.9);
    box-shadow:0 0 12px rgba(255,255,255,0.4);
    z-index:40; pointer-events:none;
    opacity:0; transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1);
  }
  .cursor.show { opacity:1; }
  .cursor.click { animation:curClick 0.25s ease; }
  @keyframes curClick { 0%,100% { transform:scale(1); } 50% { transform:scale(0.6); } }

  /* Click ripple */
  .click-ripple {
    position:absolute;
    width:40px; height:40px;
    border-radius:50%;
    border:2px solid #2DD4BF;
    opacity:0; z-index:39;
    pointer-events:none;
  }
  .click-ripple.show {
    animation:rippleOut 0.5s ease forwards;
  }
  @keyframes rippleOut {
    0% { opacity:1; transform:scale(0.5); }
    100% { opacity:0; transform:scale(2); }
  }

  /* ========== SCENE 2: Pilih Mode Paket (10-18s) ========== */
  .s2 { padding:60px 24px 40px; justify-content:flex-start; }
  .mode-panel {
    width:100%; background:#151B22;
    border:1px solid #1E2A35;
    border-radius:14px; padding:16px;
    opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .mode-panel.show { opacity:1; transform:translateY(0); }
  .mode-panel h4 {
    font-size:13px; font-weight:800; color:#E6F1EF;
    margin-bottom:12px;
  }
  .mode-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .mode-tab {
    flex:1; background:#0D1117;
    border:1px solid #1E2A35;
    border-radius:10px; padding:10px 6px;
    text-align:center; transition:all 0.3s;
  }
  .mode-tab .tab-icon { font-size:20px; margin-bottom:4px; }
  .mode-tab .tab-name { font-size:10px; font-weight:700; color:#7FA8A3; }
  .mode-tab.active {
    border-color:#2DD4BF;
    background:rgba(45,212,191,0.08);
  }
  .mode-tab.active .tab-name { color:#2DD4BF; }

  .mode-desc {
    background:#0D1117; border-radius:10px;
    padding:12px 14px;
    font-size:11px; color:#7FA8A3; line-height:1.5;
    opacity:0; transition:opacity 0.3s;
  }
  .mode-desc.show { opacity:1; }
  .mode-desc .highlight { color:#2DD4BF; font-weight:700; }

  /* ========== SCENE 3: Pilih Paket Rank (18-28s) ========== */
  .s3 { padding:60px 24px 40px; justify-content:flex-start; }
  .rank-panel {
    width:100%; opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .rank-panel.show { opacity:1; transform:translateY(0); }
  .rank-panel h4 {
    font-size:13px; font-weight:800; color:#E6F1EF;
    margin-bottom:4px;
  }
  .rank-panel .rank-sub {
    font-size:10px; color:#7FA8A3; margin-bottom:14px;
  }

  .rank-card {
    background:#151B22; border:1px solid #1E2A35;
    border-radius:12px; padding:14px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
    opacity:0; transform:translateX(-20px);
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .rank-card.show { opacity:1; transform:translateX(0); }
  .rank-card.selected {
    border-color:#2DD4BF;
    background:rgba(45,212,191,0.05);
  }
  .rank-card .rank-icon {
    width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .rank-card .rank-info { flex:1; }
  .rank-card .rank-name { font-size:13px; font-weight:800; color:#E6F1EF; }
  .rank-card .rank-route { font-size:10px; color:#7FA8A3; }
  .rank-card .rank-price {
    font-size:13px; font-weight:800; color:#2DD4BF; text-align:right;
  }
  .rank-card .rank-orig {
    font-size:9px; color:#4A5568; text-decoration:line-through;
  }
  .rank-card .rank-badge {
    font-size:8px; font-weight:800; color:#F59E0B;
    background:rgba(245,158,11,0.1);
    padding:2px 6px; border-radius:4px;
    margin-top:2px;
  }

  /* ========== SCENE 4: Express / Premium Add-ons (28-35s) ========== */
  .s4 { padding:60px 24px 40px; justify-content:flex-start; }
  .addon-panel {
    width:100%; opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .addon-panel.show { opacity:1; transform:translateY(0); }
  .addon-panel h4 {
    font-size:13px; font-weight:800; color:#E6F1EF;
    margin-bottom:12px;
  }
  .addon-card {
    background:#151B22; border:1px solid #1E2A35;
    border-radius:14px; padding:16px;
    margin-bottom:12px; display:flex;
    align-items:flex-start; gap:14px;
    opacity:0; transform:translateX(-20px);
    transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .addon-card.show { opacity:1; transform:translateX(0); }
  .addon-card.toggled { border-color:#2DD4BF; background:rgba(45,212,191,0.05); }
  .addon-icon {
    width:44px; height:44px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .addon-icon.yellow { background:rgba(245,158,11,0.15); }
  .addon-icon.purple { background:rgba(167,139,250,0.15); }
  .addon-info { flex:1; }
  .addon-name { font-size:13px; font-weight:800; color:#E6F1EF; }
  .addon-desc { font-size:10px; color:#7FA8A3; margin-top:2px; }
  .addon-price { font-size:11px; font-weight:700; color:#F59E0B; margin-top:4px; }
  .toggle-sw {
    width:40px; height:22px; border-radius:11px;
    background:#1E2A35; position:relative;
    flex-shrink:0; margin-top:4px;
    transition:background 0.3s;
  }
  .toggle-sw::after {
    content:'';
    position:absolute; top:3px; left:3px;
    width:16px; height:16px; border-radius:50%;
    background:#4A5568; transition:all 0.3s;
  }
  .toggle-sw.on { background:rgba(45,212,191,0.3); }
  .toggle-sw.on::after { left:21px; background:#2DD4BF; }

  /* ========== SCENE 5: Data Akun (35-43s) ========== */
  .s5 { padding:60px 24px 40px; justify-content:flex-start; }
  .form-panel {
    width:100%; opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .form-panel.show { opacity:1; transform:translateY(0); }
  .form-panel h4 {
    font-size:13px; font-weight:800; color:#E6F1EF;
    margin-bottom:12px;
  }
  .form-row {
    margin-bottom:10px;
    opacity:0; transform:translateY(8px);
    transition:all 0.3s ease;
  }
  .form-row.show { opacity:1; transform:translateY(0); }
  .form-label {
    font-size:10px; font-weight:700; color:#7FA8A3;
    margin-bottom:3px;
  }
  .form-input {
    width:100%; background:#0D1117;
    border:1px solid #1E2A35; border-radius:8px;
    padding:9px 12px; font-size:11px; color:#E6F1EF;
    font-family:'Inter',sans-serif;
  }
  .form-input.typing {
    border-color:#2DD4BF;
  }
  .form-input.filled {
    border-color:#22C55E;
  }
  .security-badge {
    display:flex; align-items:center; gap:6px;
    margin-top:10px; font-size:10px; color:#22C55E; font-weight:700;
    opacity:0; transition:opacity 0.3s;
  }
  .security-badge.show { opacity:1; }

  /* ========== SCENE 6: Pembayaran (43-50s) ========== */
  .s6 { padding:60px 24px 40px; justify-content:flex-start; }
  .pay-panel {
    width:100%; opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .pay-panel.show { opacity:1; transform:translateY(0); }
  .pay-panel h4 {
    font-size:13px; font-weight:800; color:#E6F1EF;
    margin-bottom:12px;
  }
  .pay-option {
    background:#151B22; border:1px solid #1E2A35;
    border-radius:12px; padding:14px;
    margin-bottom:8px; display:flex;
    align-items:center; gap:12px;
    opacity:0; transform:translateX(-20px);
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pay-option.show { opacity:1; transform:translateX(0); }
  .pay-option.selected { border-color:#2DD4BF; background:rgba(45,212,191,0.05); }
  .pay-icon {
    width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .pay-icon.bank { background:rgba(59,130,246,0.15); }
  .pay-icon.ewallet { background:rgba(34,197,94,0.15); }
  .pay-icon.qris { background:rgba(167,139,250,0.15); }
  .pay-name { font-size:12px; font-weight:800; color:#E6F1EF; }
  .pay-desc { font-size:9px; color:#7FA8A3; }
  .pay-check {
    margin-left:auto; width:22px; height:22px;
    border-radius:50%; background:rgba(45,212,191,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; opacity:0; transform:scale(0);
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pay-option.selected .pay-check { opacity:1; transform:scale(1); }

  /* Summary bar */
  .summary-bar {
    background:#151B22; border:1px solid #1E2A35;
    border-radius:12px; padding:14px;
    margin-top:12px;
    opacity:0; transition:opacity 0.3s;
  }
  .summary-bar.show { opacity:1; }
  .summary-row {
    display:flex; justify-content:space-between;
    font-size:10px; color:#7FA8A3; margin-bottom:4px;
  }
  .summary-row.total {
    font-size:14px; font-weight:900;
    color:#2DD4BF; margin-top:6px; padding-top:6px;
    border-top:1px solid #1E2A35;
  }

  /* ========== SCENE 7: Bayar + Tracking (50-57s) ========== */
  .s7 { padding:60px 24px 40px; justify-content:flex-start; gap:14px; }
  .confirm-panel {
    width:100%; opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .confirm-panel.show { opacity:1; transform:translateY(0); }

  .big-btn {
    width:100%; background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    color:#0F1419; font-size:14px; font-weight:800;
    padding:14px; border-radius:12px; text-align:center;
    opacity:0; transform:translateY(10px);
    transition:all 0.4s ease;
  }
  .big-btn.show { opacity:1; transform:translateY(0); }
  .big-btn.processing {
    background:linear-gradient(135deg,#1E2A35,#151B22);
    color:#2DD4BF;
    border:1px solid #2DD4BF;
  }
  .big-btn.success {
    background:linear-gradient(135deg,#22C55E,#16A34A);
    color:#fff;
  }

  .tracking-card {
    width:100%; background:#151B22;
    border:1px solid rgba(45,212,191,0.2);
    border-radius:14px; padding:16px;
    opacity:0; transform:translateY(15px);
    transition:all 0.4s ease;
  }
  .tracking-card.show { opacity:1; transform:translateY(0); }
  .tracking-card h5 {
    font-size:12px; font-weight:800; color:#E6F1EF;
    margin-bottom:10px;
  }
  .track-bar {
    width:100%; height:6px; background:#1E2A35;
    border-radius:3px; overflow:hidden; margin-bottom:6px;
  }
  .track-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,#2DD4BF,#22C55E);
    border-radius:3px; transition:width 2s ease;
  }
  .track-fill.go { width:35%; }
  .track-steps-row {
    display:flex; justify-content:space-between;
    font-size:8px; color:#7FA8A3;
  }
  .track-steps-row .done { color:#22C55E; font-weight:700; }
  .wa-notif {
    margin-top:10px; background:#0D1117;
    border-radius:10px; padding:10px;
    opacity:0; transition:opacity 0.3s;
  }
  .wa-notif.show { opacity:1; }
  .wa-notif .wa-title {
    font-size:10px; color:#22C55E; font-weight:700; margin-bottom:3px;
  }
  .wa-notif .wa-msg {
    font-size:9px; color:#B8D4CF; line-height:1.4;
  }

  /* ========== SCENE 8: CTA Ending (57-60s) ========== */
  .s8 {
    background:radial-gradient(ellipse at 50% 50%, rgba(45,212,191,0.12) 0%, #0F1419 60%);
    gap:14px;
  }
  .s8 .end-logo {
    font-size:48px; font-weight:900; letter-spacing:6px;
    background:linear-gradient(135deg,#2DD4BF,#A78BFA);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    opacity:0; transform:scale(0.7);
    transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .s8 .end-logo.show { opacity:1; transform:scale(1); }
  .s8 .end-text {
    font-size:18px; font-weight:700; color:#E6F1EF;
    text-align:center;
    opacity:0; transition:opacity 0.4s ease 0.2s;
  }
  .s8 .end-text.show { opacity:1; }
  .s8 .end-cta {
    background:linear-gradient(135deg,#2DD4BF,#7FA8A3);
    color:#0F1419; font-weight:800; font-size:15px;
    padding:14px 36px; border-radius:14px;
    opacity:0; transform:translateY(10px);
    transition:all 0.4s ease 0.4s;
  }
  .s8 .end-cta.show {
    opacity:1; transform:translateY(0);
    animation:ctaPulse 1.2s ease infinite 0.6s;
  }
  @keyframes ctaPulse {
    0%,100% { box-shadow:0 0 0 0 rgba(45,212,191,0.4); }
    50% { box-shadow:0 0 0 12px rgba(45,212,191,0); }
  }
  .s8 .end-badge {
    font-size:12px; font-weight:800; color:#7FA8A3;
    opacity:0; transition:opacity 0.3s ease 0.6s;
  }
  .s8 .end-badge.show { opacity:1; }

  /* ========== AUDIO BARS ========== */
  .audio-bars {
    position:absolute; top:16px; right:16px;
    z-index:200;
    display:flex; gap:2px; align-items:flex-end; height:14px;
    opacity:0; transition:opacity 0.3s;
  }
  .audio-bars.show { opacity:1; }
  .audio-bars .ab {
    width:3px; background:#2DD4BF; border-radius:2px;
    animation:aBounce 0.7s ease-in-out infinite alternate;
  }
  .audio-bars .ab:nth-child(1) { height:5px; animation-delay:0s; }
  .audio-bars .ab:nth-child(2) { height:10px; animation-delay:0.12s; }
  .audio-bars .ab:nth-child(3) { height:7px; animation-delay:0.25s; }
  .audio-bars .ab:nth-child(4) { height:12px; animation-delay:0.08s; }
  .audio-bars .ab:nth-child(5) { height:5px; animation-delay:0.2s; }
  @keyframes aBounce { 0%{transform:scaleY(0.4);} 100%{transform:scaleY(1);} }

  /* ========== TIMER BAR ========== */
  .timer-bar {
    position:absolute; bottom:0; left:0;
    height:4px;
    background:linear-gradient(90deg,#2DD4BF,#22C55E);
    width:0%; z-index:100;
  }

  /* ========== CONTROLS ========== */
  .controls {

  }

  .timer-display {

  }
  .hide-controls .controls { display:none; }
  /* Lucide Icons */
  [data-lucide]{fill:none;stroke-linecap:round;stroke-linejoin:round;display:block;}
  .lci[data-lucide]{display:inline-block;vertical-align:middle;margin-right:2px;}

<script>
// ============ WEB AUDIO ENGINE ============
let audioCtx=null, isMuted=false, masterGain=null, bgOsc=null;

function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
}

function toggleMute() {
  isMuted=!isMuted;
  const btn=document.getElementById('muteBtn');
  if(isMuted){ btn.textContent='\uD83D\uDD07 Muted'; btn.classList.add('muted'); if(masterGain)masterGain.gain.value=0; }
  else{ btn.textContent='\uD83D\uDD0A Sound'; btn.classList.remove('muted'); if(masterGain)masterGain.gain.value=0.5; }
}

// BG Music — chill electronic tutorial vibe
function startBG() {
  if(!audioCtx) return;
  // Soft pad
  bgOsc = audioCtx.createOscillator();
  bgOsc.type='sine'; bgOsc.frequency.value=110;
  const bg = audioCtx.createGain(); bg.gain.value=0.06;
  const lfo = audioCtx.createOscillator();
  lfo.type='sine'; lfo.frequency.value=1.5;
  const lfoG = audioCtx.createGain(); lfoG.gain.value=0.03;
  lfo.connect(lfoG); lfoG.connect(bg.gain); lfo.start();
  bgOsc.connect(bg); bg.connect(masterGain); bgOsc.start();

  // Ambient noise
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*2, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const ns = audioCtx.createBufferSource(); ns.buffer=buf; ns.loop=true;
  const nf = audioCtx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=180;
  const ng = audioCtx.createGain(); ng.gain.value=0.02;
  ns.connect(nf); nf.connect(ng); ng.connect(masterGain); ns.start();
  bgOsc._lfo=lfo; bgOsc._ns=ns;
}
function stopBG() {
  if(bgOsc){ try{bgOsc.stop();bgOsc._lfo.stop();bgOsc._ns.stop();}catch(e){} bgOsc=null; }
}

// SFX functions
function sfxWhoosh() {
  if(!audioCtx) return;
  const b=audioCtx.createBuffer(1,audioCtx.sampleRate*0.25,audioCtx.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const s=audioCtx.createBufferSource(); s.buffer=b;
  const f=audioCtx.createBiquadFilter(); f.type='bandpass'; f.Q.value=0.5;
  f.frequency.setValueAtTime(400,audioCtx.currentTime);
  f.frequency.exponentialRampToValueAtTime(2500,audioCtx.currentTime+0.12);
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  s.connect(f); f.connect(g); g.connect(masterGain); s.start();
}

function sfxClick() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=1200;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.08);
}

function sfxSlide() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(500,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.1);
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.05,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.1);
}

function sfxDing(p) {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=p||1200;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.25);
}

function sfxToggle() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(600,audioCtx.currentTime);
  o.frequency.setValueAtTime(900,audioCtx.currentTime+0.05);
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.07,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.1);
}

function sfxType() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='square'; o.frequency.value=1600;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.025);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.025);
}

function sfxSuccess() {
  if(!audioCtx) return;
  [800,1000,1200].forEach((f,i)=>{
    const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.08,audioCtx.currentTime+i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+i*0.12+0.3);
    o.connect(g); g.connect(masterGain); o.start(audioCtx.currentTime+i*0.12); o.stop(audioCtx.currentTime+i*0.12+0.3);
  });
}

function sfxImpact() {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(150,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50,audioCtx.currentTime+0.4);
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.4);
}

// ============ CURSOR HELPERS ============
function moveCursor(x,y) {
  const c=document.getElementById('cursor');
  c.style.left=x+'px'; c.style.top=y+'px';
}
function showCursor() { document.getElementById('cursor').classList.add('show'); }
function hideCursor() { document.getElementById('cursor').classList.remove('show'); }
function clickAt(x,y) {
  const c=document.getElementById('cursor');
  const r=document.getElementById('ripple');
  c.classList.add('click');
  r.style.left=(x-10)+'px'; r.style.top=(y-10)+'px';
  r.classList.remove('show');
  void r.offsetWidth;
  r.classList.add('show');
  sfxClick();
  setTimeout(()=>c.classList.remove('click'),250);
}

function updateStageScale() {
  const maxWidth = window.innerWidth - 32;
  const maxHeight = window.innerHeight - 32;
  const scale = Math.min(maxWidth / 390, maxHeight / 844, 1);
  document.documentElement.style.setProperty('--phone-scale', String(scale));
}

// Step indicator helpers
function activateStep(n) {
  for(let i=1;i<=7;i++){
    const d=document.getElementById('sd'+i);
    if(i<n){ d.className='step-dot done'; d.textContent='\u2713'; }
    else if(i===n){ d.className='step-dot active'; d.textContent=i; }
    else{ d.className='step-dot'; d.textContent=i; }
  }
  for(let i=1;i<=6;i++){
    document.getElementById('sl'+i).className = i<n ? 'step-line done' : 'step-line';
  }
}

// ============ ANIMATION ENGINE ============
const TOTAL = 60000;
let playing=false, startTime=0, animFrame=null, fired={};

const SCENES = [
  {id:'scene0', start:0,     end:3000 },
  {id:'scene1', start:3000,  end:10000},
  {id:'scene2', start:10000, end:18000},
  {id:'scene3', start:18000, end:28000},
  {id:'scene4', start:28000, end:35000},
  {id:'scene5', start:35000, end:43000},
  {id:'scene6', start:43000, end:50000},
  {id:'scene7', start:50000, end:57000},
  {id:'scene8', start:57000, end:60000},
];

function startAnimation() {
  if(playing) return;
  initAudio();
  playing=true; fired={}; startTime=performance.now();
  document.getElementById('previewLaunch').classList.add('hidden');
  document.getElementById('previewNote').classList.add('hidden');
  document.getElementById('previewFloating').classList.remove('show');
  document.getElementById('playBtn').textContent='\u23F8 Playing...';
  document.getElementById('playBtn').style.opacity='0.5';

  // Reset
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.show,.selected,.toggled,.typing,.filled,.processing,.success,.done,.go').forEach(el=>{
    el.classList.remove('show','selected','toggled','typing','filled','processing','success','done','go');
  });
  // Reset step dots
  for(let i=1;i<=7;i++){ const d=document.getElementById('sd'+i); d.className='step-dot'; d.textContent=i; }
  for(let i=1;i<=6;i++) document.getElementById('sl'+i).className='step-line';

  document.getElementById('timerBar').style.width='0%';
  document.getElementById('payBtn').textContent='\uD83D\uDCB0 BAYAR SEKARANG \u2014 Rp 264.000';
  document.getElementById('payBtn').className='big-btn';
  document.getElementById('trackFill').style.width='0%';
  document.getElementById('trackFill').classList.remove('go');
  hideCursor();

  stopBG(); startBG();
  document.getElementById('audioBars').classList.add('show');

  tick();
}

function tick() {
  const elapsed = performance.now()-startTime;
  const pct = Math.min((elapsed/TOTAL)*100,100);
  document.getElementById('timerBar').style.width=pct+'%';
  document.getElementById('timerDisplay').textContent=(elapsed/1000).toFixed(1)+'s / 60s';

  // Activate scenes
  SCENES.forEach(sc=>{
    const el=document.getElementById(sc.id);
    if(elapsed>=sc.start && elapsed<sc.end){
      if(!el.classList.contains('active')) el.classList.add('active');
    } else { el.classList.remove('active'); }
  });

  // ==== SCENE 0: Hook (0-3s) ====
  if(elapsed>=200 && !fired.hook){
    fired.hook=true;
    document.getElementById('hookText').classList.add('show');
    sfxImpact();
  }
  if(elapsed>=800 && !fired.hookSub){
    fired.hookSub=true;
    document.getElementById('hookSub').classList.add('show');
  }
  if(elapsed>=1400 && !fired.hookBadge){
    fired.hookBadge=true;
    document.getElementById('hookBadge').classList.add('show');
    sfxDing(1000);
  }

  // Transition whoosh
  if(elapsed>=2800 && !fired.w0){ fired.w0=true; sfxWhoosh(); }

  // ==== SCENE 1: Buka Website (3-10s) ====
  if(elapsed>=3200 && !fired.s1Start){
    fired.s1Start=true;
    document.getElementById('stepOverlay').classList.add('show');
    activateStep(1);
    document.getElementById('stepLabel1').classList.add('show');
    document.getElementById('browser1').classList.add('show');
  }
  if(elapsed>=4500 && !fired.s1Cursor){
    fired.s1Cursor=true;
    showCursor();
    moveCursor(310,155);
  }
  if(elapsed>=5500 && !fired.s1Move){
    fired.s1Move=true;
    moveCursor(318,155);
  }
  if(elapsed>=6500 && !fired.s1Click){
    fired.s1Click=true;
    clickAt(318,155);
    document.getElementById('pulseRing').classList.add('show');
  }

  if(elapsed>=9800 && !fired.w1){ fired.w1=true; sfxWhoosh(); hideCursor(); }

  // ==== SCENE 2: Pilih Mode (10-18s) ====
  if(elapsed>=10200 && !fired.s2Start){
    fired.s2Start=true;
    activateStep(2);
    document.getElementById('stepLabel2').classList.add('show');
    document.getElementById('modePanel').classList.add('show');
  }
  if(elapsed>=12000 && !fired.s2Cursor){
    fired.s2Cursor=true;
    showCursor();
    moveCursor(89,169);
  }
  if(elapsed>=13000 && !fired.s2Click){
    fired.s2Click=true;
    clickAt(89,169);
    document.getElementById('tabPaket').style.transform='scale(0.95)';
    setTimeout(()=>document.getElementById('tabPaket').style.transform='',150);
  }
  if(elapsed>=14000 && !fired.s2Desc){
    fired.s2Desc=true;
    document.getElementById('modeDesc').classList.add('show');
    sfxSlide();
  }

  if(elapsed>=17800 && !fired.w2){ fired.w2=true; sfxWhoosh(); hideCursor(); }

  // ==== SCENE 3: Pilih Paket (18-28s) ====
  if(elapsed>=18200 && !fired.s3Start){
    fired.s3Start=true;
    activateStep(3);
    document.getElementById('stepLabel3').classList.add('show');
    document.getElementById('rankPanel').classList.add('show');
  }
  if(elapsed>=19200 && !fired.s3R1){
    fired.s3R1=true;
    document.getElementById('rank1').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=20500 && !fired.s3R2){
    fired.s3R2=true;
    document.getElementById('rank2').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=21800 && !fired.s3R3){
    fired.s3R3=true;
    document.getElementById('rank3').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=23500 && !fired.s3Cursor){
    fired.s3Cursor=true;
    showCursor();
    moveCursor(200,352);
  }
  if(elapsed>=24500 && !fired.s3Select){
    fired.s3Select=true;
    clickAt(200,352);
    document.getElementById('rank3').classList.add('selected');
    sfxDing(1100);
  }

  if(elapsed>=27800 && !fired.w3){ fired.w3=true; sfxWhoosh(); hideCursor(); }

  // ==== SCENE 4: Add-ons (28-35s) ====
  if(elapsed>=28200 && !fired.s4Start){
    fired.s4Start=true;
    activateStep(4);
    document.getElementById('stepLabel4').classList.add('show');
    document.getElementById('addonPanel').classList.add('show');
  }
  if(elapsed>=29000 && !fired.s4A1){
    fired.s4A1=true;
    document.getElementById('addon1').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=30000 && !fired.s4A2){
    fired.s4A2=true;
    document.getElementById('addon2').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=31500 && !fired.s4Cursor){
    fired.s4Cursor=true;
    showCursor();
    moveCursor(330,186);
  }
  if(elapsed>=32500 && !fired.s4Toggle){
    fired.s4Toggle=true;
    clickAt(330,186);
    document.getElementById('toggleExpress').classList.add('on');
    document.getElementById('addon1').classList.add('toggled');
    sfxToggle();
  }

  if(elapsed>=34800 && !fired.w4){ fired.w4=true; sfxWhoosh(); hideCursor(); }

  // ==== SCENE 5: Data Akun (35-43s) ====
  if(elapsed>=35200 && !fired.s5Start){
    fired.s5Start=true;
    activateStep(5);
    document.getElementById('stepLabel5').classList.add('show');
    document.getElementById('formPanel').classList.add('show');
  }
  if(elapsed>=35800 && !fired.s5F1){
    fired.s5F1=true;
    document.getElementById('fr1').classList.add('show');
    sfxType();
  }
  if(elapsed>=36600 && !fired.s5F2){
    fired.s5F2=true;
    document.getElementById('fr2').classList.add('show');
    document.getElementById('inputId').classList.add('typing');
    sfxType();
    setTimeout(()=>{ document.getElementById('inputId').classList.remove('typing'); document.getElementById('inputId').classList.add('filled'); },800);
  }
  if(elapsed>=37800 && !fired.s5F3){
    fired.s5F3=true;
    document.getElementById('fr3').classList.add('show');
    document.getElementById('inputEmail').classList.add('typing');
    sfxType();
    setTimeout(()=>{ document.getElementById('inputEmail').classList.remove('typing'); document.getElementById('inputEmail').classList.add('filled'); },600);
  }
  if(elapsed>=39200 && !fired.s5F4){
    fired.s5F4=true;
    document.getElementById('fr4').classList.add('show');
    document.getElementById('inputPw').classList.add('typing');
    sfxType();
    setTimeout(()=>{ document.getElementById('inputPw').classList.remove('typing'); document.getElementById('inputPw').classList.add('filled'); },600);
  }
  if(elapsed>=40500 && !fired.s5Sec){
    fired.s5Sec=true;
    document.getElementById('secBadge').classList.add('show');
    sfxDing(1300);
  }

  if(elapsed>=42800 && !fired.w5){ fired.w5=true; sfxWhoosh(); }

  // ==== SCENE 6: Pembayaran (43-50s) ====
  if(elapsed>=43200 && !fired.s6Start){
    fired.s6Start=true;
    activateStep(6);
    document.getElementById('stepLabel6').classList.add('show');
    document.getElementById('payPanel').classList.add('show');
  }
  if(elapsed>=44000 && !fired.s6P1){
    fired.s6P1=true;
    document.getElementById('pay1').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=44800 && !fired.s6P2){
    fired.s6P2=true;
    document.getElementById('pay2').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=45600 && !fired.s6P3){
    fired.s6P3=true;
    document.getElementById('pay3').classList.add('show');
    sfxSlide();
  }
  if(elapsed>=46500 && !fired.s6Select){
    fired.s6Select=true;
    showCursor(); moveCursor(200,250);
  }
  if(elapsed>=47200 && !fired.s6Click){
    fired.s6Click=true;
    clickAt(200,250);
    document.getElementById('pay2').classList.add('selected');
    sfxDing(1000);
  }
  if(elapsed>=48000 && !fired.s6Summary){
    fired.s6Summary=true;
    document.getElementById('summaryBar').classList.add('show');
    sfxDing(1200);
    hideCursor();
  }

  if(elapsed>=49800 && !fired.w6){ fired.w6=true; sfxWhoosh(); }

  // ==== SCENE 7: Bayar + Tracking (50-57s) ====
  if(elapsed>=50200 && !fired.s7Start){
    fired.s7Start=true;
    activateStep(7);
    document.getElementById('stepLabel7').classList.add('show');
    document.getElementById('confirmPanel').classList.add('show');
    document.getElementById('payBtn').classList.add('show');
  }
  if(elapsed>=51500 && !fired.s7Cursor){
    fired.s7Cursor=true;
    showCursor(); moveCursor(200,133);
  }
  if(elapsed>=52000 && !fired.s7Pay){
    fired.s7Pay=true;
    clickAt(200,133);
    const btn=document.getElementById('payBtn');
    btn.classList.add('processing');
    btn.textContent='\u23F3 Memproses...';
  }
  if(elapsed>=53500 && !fired.s7Success){
    fired.s7Success=true;
    const btn=document.getElementById('payBtn');
    btn.classList.remove('processing');
    btn.classList.add('success');
    btn.textContent='\u2705 Order Berhasil!';
    sfxSuccess();
    hideCursor();
  }
  if(elapsed>=54500 && !fired.s7Track){
    fired.s7Track=true;
    document.getElementById('trackCard').classList.add('show');
    document.getElementById('trackFill').classList.add('go');
  }
  if(elapsed>=55500 && !fired.s7WA){
    fired.s7WA=true;
    document.getElementById('waNotif').classList.add('show');
    sfxDing(1500);
  }

  if(elapsed>=56800 && !fired.w7){ fired.w7=true; sfxWhoosh(); }

  // ==== SCENE 8: CTA (57-60s) ====
  if(elapsed>=57200 && !fired.s8Start){
    fired.s8Start=true;
    document.getElementById('stepOverlay').classList.remove('show');
    document.getElementById('endLogo').classList.add('show');
    document.getElementById('endText').classList.add('show');
    document.getElementById('endCta').classList.add('show');
    document.getElementById('endBadge').classList.add('show');
    sfxImpact();
  }

  if(elapsed<TOTAL){
    animFrame=requestAnimationFrame(tick);
  } else {
    playing=false;
    stopBG();
    document.getElementById('audioBars').classList.remove('show');
    document.getElementById('previewLaunch').classList.remove('hidden');
    document.getElementById('previewNote').classList.remove('hidden');
    document.getElementById('previewFloating').classList.add('show');
    document.getElementById('playBtn').textContent='\u25B6 Play';
    document.getElementById('playBtn').style.opacity='1';
    document.getElementById('timerDisplay').textContent='60.0s / 60s';
  }
}

function toggleRecMode() {
  const btn=document.getElementById('recBtn');
  document.body.classList.toggle('hide-controls');
  if(document.body.classList.contains('hide-controls')){
    btn.classList.add('recording');
    btn.textContent='\u2B1B Exit Rec';
    setTimeout(startAnimation,1000);
  } else {
    btn.classList.remove('recording');
    btn.textContent='\uD83D\uDD34 Rec Mode';
  }
}
window.addEventListener('resize', updateStageScale);
document.addEventListener('DOMContentLoaded',()=>{if(typeof lucide!=='undefined')lucide.createIcons();});
document.addEventListener('DOMContentLoaded',updateStageScale);
